<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Server Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="text">
        <h1>MC SERVER.<span class="highlight">PVP</span></h1>
        <p>THE ULTIMATE PVP PRACTICE EXPERIENCE</p>
    </div>

    <div class="server" onclick="copyIp()">
        <h2 id="serverIp">mcserver.pvp</h2>
        <p>Players ONline: <span id="count">6,767</span></p>
    </div>

    <div class="urls">
        <a href="#">Forums</a>
        <a href="#">Rules</a>
        <a href="#">Store</a>
        <a href="#">Leaderboards</a>
    </div>

    <div class="regions-container">
        <h2>CHOOSE REGION</h2>
        <div class="regions-grid">
            <div class="region-card">
                <h3>NA.MCSERVER.PVP</h3>
                <p class="status">North America</p>
            </div>
            <div class="region-card">
                <h3>EU.MCSERVER.PVP</h3>
                <p class="status">Europe</p>
            </div>
            <div class="region-card">
                <h3>AU.MCSERVER.PVP</h3>
                <p class="status">Australia</p>
            </div>
        </div>
    </div>

    <div class="banner"></div>
    <script src="index.js"></script>
</body>
</html>
